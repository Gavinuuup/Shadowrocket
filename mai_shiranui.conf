其他地区 = select,policy-regex-filter=(?i)^(?!.*(?:港|🇭🇰|hk|hong|台|🇼🇸|🇹🇼|TW|tai|(?<!尼)日|🇯🇵|jp|japan|韩|🇰🇷|韓|首尔|南朝鲜|kr|korea|south|坡|狮|🇸🇬|sg|sing|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|(?<!rus)(?<!austral)us)).*$

