;美国 = load-balance,url=http://www.gstatic.com/generate_204,interval=600,timeout=5,policy-regex-filter=(?i)^(?=.*(美|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|States|America|US|🇺🇸))(?!.*(russia|Australia)).*$
韩国 = url-test,interval=600,tolerance=20,timeout=5,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)(韩|🇰🇷|韓|首尔|南朝鲜|kr|korea|south)
;韩国 = fallback,interval=600,timeout=5,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)(韩|🇰🇷|韓|首尔|南朝鲜|kr|korea|south)
俄国 = url-test,interval=600,tolerance=20,timeout=5,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?=.*(俄|🇷🇺|ru))(?!.*俄亥).*$
